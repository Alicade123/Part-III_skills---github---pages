---
layout: default
---

<section class="hero">
  <h1>Hi, I'm Alicade 👋</h1>
  <p>QA Engineer • Developer • Cloud Enthusiast</p>
</section>

<section>
  <h2>Latest Posts</h2>

  {% for post in site.posts limit:5 %}
  <div class="post-card">
    <h3>
      <a href="{{ post.url | relative_url }}">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <a class="read-more" href="{{ post.url | absolute_url }}">Read more →</a>
        {{ post.title }}
      </a>
    </h3>
    <p>{{ post.excerpt }}</p>
  </div>
  {% endfor %}

</section>
